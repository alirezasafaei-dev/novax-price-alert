name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write

jobs:
  lint-python:
    name: Lint Python Code
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - run: uv sync --all-extras

      - name: Run Ruff linting
        run: uv run ruff check .

      - name: Run Ruff format check
        run: uv run ruff format --check .

  type-check-python:
    name: Type Check Python Code
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - run: uv sync --all-extras

      - run: uv run mypy src

  test-python:
    name: Test Python Code
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - run: uv sync --all-extras

      - run: uv run pytest
        id: pytest

  test-cloudflare-worker:
    name: Test Cloudflare Worker
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - run: npm ci
        working-directory: deploy/cloudflare-worker

      - run: npm test
        working-directory: deploy/cloudflare-worker

  security-scan-python:
    name: Security Scan Python
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - run: uv sync --all-extras

      - name: Run security checks
        run: uv run bandit -r src || true

      - name: Check dependencies for vulnerabilities
        run: uv pip check || true

  notify-failure:
    name: Notify on Failure
    needs: [lint-python, type-check-python, test-python, test-cloudflare-worker]
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.OPS_BOT_TOKEN }}
          OPS_CHAT_ID: ${{ secrets.OPS_CHAT_ID }}
