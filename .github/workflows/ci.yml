name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - run: uv sync --all-extras

      - run: uv run ruff check .

      - run: uv run mypy src

      - run: uv run pytest

      - run: npm ci
        working-directory: deploy/cloudflare-worker

      - run: npm test
        working-directory: deploy/cloudflare-worker
