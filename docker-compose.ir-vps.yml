version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: novax-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-novax}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-novax_price_alert}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-novax} -d ${POSTGRES_DB:-novax_price_alert}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - novax-network

  # Redis for queue and caching
  redis:
    image: redis:7-alpine
    container_name: novax-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - novax-network

  # FastAPI Application
  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: novax-api
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-novax}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-novax_price_alert}
      REDIS_URL: redis://redis:6379/0
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-https://your-domain.ir/api/v1/bot/webhook}
      METRICS_ACCESS_TOKEN: ${METRICS_ACCESS_TOKEN:-changeme}
      USE_MOCK_PROVIDER: "false"
      USE_MOCK_NOTIFICATIONS: "false"
      NERKH_API_KEY: ${NERKH_API_KEY:-}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-your-domain.ir}
    volumes:
      - ./app/src:/app/src:ro
      - ./app/migrations:/app/migrations:ro
      - ./logs:/app/logs
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - novax-network

  # Background Worker
  worker:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: novax-worker
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-novax}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-novax_price_alert}
      REDIS_URL: redis://redis:6379/0
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      USE_MOCK_PROVIDER: "false"
      USE_MOCK_NOTIFICATIONS: "false"
      NERKH_API_KEY: ${NERKH_API_KEY:-}
    volumes:
      - ./app/src:/app/src:ro
      - ./app/migrations:/app/migrations:ro
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m novax_price_alert.worker_main
    networks:
      - novax-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: novax-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - api
    networks:
      - novax-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  novax-network:
    driver: bridge
