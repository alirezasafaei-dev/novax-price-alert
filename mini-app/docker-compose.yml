version: '3.8'

services:
  mini-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NOVAX_API_BASE=http://host.docker.internal:8001
    restart: unless-stopped
    networks:
      - novax-network

networks:
  novax-network:
    driver: bridge